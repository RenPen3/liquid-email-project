<!doctype html>

<html
  lang="en"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office"
>
  <head>
    <meta charset="utf-8" />

    <meta name="viewport" content="width=device-width" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <meta name="x-apple-disable-message-reformatting" />

    <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />

    <meta name="color-scheme" content="light dark" />

    <meta name="supported-color-schemes" content="light dark" />

    <title>Basic Email Template</title>
  </head>
  <!--[if gte mso 9]>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  <![endif]-->

  <!-- Force safe font in Outlook -->

  <!--[if mso]>
    <style>
      * {
        font-family: Arial, sans-serif !important;
      }
    </style>
  <![endif]-->

  <style>
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }

    html,
    body {
      margin: 0 auto !important;
      padding: 0 !important;
      margin: 0 !important;
      height: 100% !important;
      width: 100% !important;
    }

    * {
      -ms-text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    div[style*='margin: 16px 0'] {
      margin: 0 !important;
    }

    #MessageViewBody,
    #MessageWebViewDiv {
      width: 100% !important;
    }

    table,
    td {
      mso-table-lspace: 0pt !important;
      mso-table-rspace: 0pt !important;
    }

    table {
      border-spacing: 0 !important;
      border-collapse: collapse !important;
      table-layout: fixed !important;
      margin: 0 auto !important;
    }

    img {
      -ms-interpolation-mode: bicubic;
    }

    a {
      text-decoration: none;
    }

    a[x-apple-data-detectors],
    .unstyle-auto-detected-links a,
    .aBn {
      border-bottom: 0 !important;
      cursor: default !important;
      color: inherit !important;
      text-decoration: none !important;

      font-size: inherit !important;
      font-family: inherit !important;
      font-weight: inherit !important;
      line-height: inherit !important;
    }

    .im {
      color: inherit !important;
    }

    .a6S {
      display: none !important;
      opacity: 0.01 !important;
    }

    img.g-img + div {
      display: none !important;
    }

    .cta-show {
      display: none !important;
    }

    /* Gmail iOS right-gutter fixes */

    @media only screen and (max-width: 320px) and (max-device-width: 374px) {
      u ~ div .email-container {
        max-width: 320px !important;
      }

      .col-break {
        width: 100% !important;
        max-width: 100% !important;
      }
    }

    @media only screen and (max-width: 375px) and (max-device-width: 413px) {
      u ~ div .email-container {
        max-width: 375px !important;
      }
    }

    @media only screen and (max-width: 414px) {
      u ~ div .email-container {
        max-width: 414px !important;
      }
    }

    @media screen and (max-width: 540px) {
      .alignCenter {
        display: block !important;
        text-align: center !important;
        margin: 0 auto !important;
      }

      .fullWidth-logo {
        display: block;
        text-align: center !important;
        width: 100% !important;
        max-width: 100% !important;
        padding: 0 !important;
      }

      .fullWidth {
        width: 90% !important;
        max-width: 90% !important;
      }

      .card-img {
        width: 100% !important;
        max-width: 100px !important;
      }

      .text-content-left {
        text-align: left !important;
      }

      .col-break {
        display: block;
        padding: 0px !important;
        width: 100% !important;
        max-width: 100% !important;
        margin-bottom: 40px !important;
      }
    }

    /* Hover */

    .button-td,
    .button-a {
      transition: all 100ms ease-in;
    }

    .button-td-primary:hover,
    .button-a-primary:hover {
      background: #555555 !important;
      border-color: #555555 !important;
    }
  </style>

  <body width="100%" style="padding: 0 !important; font-family: Arial, Helvetica, sans-serif">
    <center role="article" aria-roledescription="email" lang="en" style="width: 100%; margin: 20px 0">
      <!-- Hidden Preheader -->
      <div style="max-height: 0; overflow: hidden; mso-hide: all" aria-hidden="true">
        Thanks for subscribing - here's what's new, plus tips and resources inside.
      </div>
      <!-- Preview Text Spacing Hack -->
      <div
        style="display: none;font-size: 1px;line-height: 1px;max-height: 0px;max-width: 0px;opacity: 0;overflow: hidden;mso-hide: all;font-family: sans-serif;"
      >
        &zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;
      </div>
      <!-- Start of Email -->

      <script type="text/template">
        <div style="max-width: 640px; margin: 0 auto" class="email-container">
          <!--[if mso]>
        <table width="640" align="center" cellpadding="0" cellspacing="0" border="0" role="presentation">
        <tr>
        <td>
        <![endif]-->

          <!-- Header -->
          <table width="100%" align="center" cellpadding="0" cellspacing="0" border="0" role="presentation" bgcolor="#fafafa">
            <tr>
              <td align="center" valign="middle" style="padding: 16px;">
                <table align="center" cellpadding="0" cellspacing="0" border="0" role="presentation">
                  <tr>
                    <td align="center">
                      <a href="#">
                        <h3 style="font-size: 22px;font-weight: 800;color: #242424;margin: 0;">{{user.company | upcase}}</h3>
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
          <!-- /Header -->

          <!-- Hero Image -->
          <table width="100%" align="center" cellpadding="0" cellspacing="0" border="0" role="presentation">
            <tr>
              <td align="center">
                <a href="#">
                  <!-- https://i.ibb.co/MDsbdYZ4/hero-guitar.webp -->
                  <!-- src="images/hero_img2.jpg" -->
                  <img src="https://placehold.co/1200x800" alt="Hero Image" style="display: block;width: 100%;max-width: 100%;object-fit: cover;" />
                </a>
              </td>
            </tr>
          </table>
          <!-- /Hero Image -->

          <!-- Body Content -->
          <table width="100%" align="center" cellpadding="0" cellspacing="0" border="0" role="presentation" bgcolor="#FAFAFA" style="background-color: #fafafa">
            <tr>
              <td align="left">
                <h1 style="color: #1c1c1c;padding: 0 24px;margin: 24px 0 0 0;line-height: 40px;">

                  {{ customer.name | capitalized | prepend: "Welcome, " | append: "!"}}
                  
                </h1>
              </td>
            </tr>
            <tr>
              <td style="color: #1c1c1c;padding: 0 24px;">
                <p style="margin: 0;font-size: 18px;font-weight: 700;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                line-height: 26px;color: #1c1c1c;">{{ customer.rewards | prepend: "Claim your " | append: "pts" }}</p>
              </td>
            </tr>
            <tr>
              <td align="left" style="padding: 0 24px 30px 24px">
                <p style="font-size: 16px;font-weight: 400;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                line-height: 26px;color: #1c1c1c;">
                  Lorem ipsum dolor consectetur, adipisicing elit. Dolorem
                  repellendus neque repudiandae. Adipisicing elit <strong>sit amet consectetur</strong> dipisicing elit. Esse non
                  eveniet
                  <a href="https://www.lumens.com/" target="_blank" style="font-size: 16px;font-weight: 400;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                  color: #ff0022;text-decoration: underline;text-underline-offset: 3px;">{{ user.url }}</a> exercitationem
                </p>
              </td>
            </tr>
          </table>
          <!-- /Body Content -->




      </script>
    </center>

    <div id="result"></div>
    <!-- For Development -->
    <script src="https://cdn.jsdelivr.net/npm/liquidjs/dist/liquid.browser.umd.js"></script>

    <script>
      const template = document.querySelector('[type="text/template"]');
      const result = document.querySelector('#result');
      const engine = new liquidjs.Liquid();

      engine
        .parseAndRender(template.innerHTML, {
          user: {
            company: 'Lumens',
            url: 'lumens.com'
          },

          customer: {
            name: 'John',
            rewards: 200
          }
        })
        .then(html => (result.innerHTML = html));
    </script>
  </body>
</html>
